name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: go mod download

    - name: Run unit tests with coverage
      run: |
        go test -v -coverpkg=./... -coverprofile=coverage.out ./tests/...

    - name: Display coverage report
      if: hashFiles('coverage.out') != ''
      run: |
        echo "=== Coverage Summary ==="
        go tool cover -func=coverage.out | tail -1
        echo "" 
        echo "=== Coverage by Package ==="
        go tool cover -func=coverage.out \
        | grep -v "_test.go" \
        | grep -v "^total" \
        | awk '{printf "%-60s %s\n", $1, $3}' \
        | sort

    - name: Generate HTML coverage report
      if: hashFiles('coverage.out') != ''
      run: go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage artifact
      if: hashFiles('coverage.html') != ''
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.html
        retention-days: 30

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
        echo "**Test Coverage: ${COVERAGE}**" >> $GITHUB_STEP_SUMMARY

    - name: Build binary
      run: go build -v -o miniDocker .

  integration-test:
    name: Integration Tests (with root)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      run: go mod download

    - name: Build binary for integration tests
      run: go build -v -o miniDocker_test .

    - name: Run integration tests with coverage
      run: |
        cd tests
        sudo --preserve-env=PATH $(which go) test -v -coverprofile=integration-coverage.out . || echo "Integration tests completed"

    - name: Run benchmarks (if root available)
      run: |
        cd tests
        sudo --preserve-env=PATH $(which go) test -v -run TestBench -timeout 60s . || echo "Benchmarks skipped"

    - name: Run integration tests
      run: |
        cd tests
        sudo --preserve-env=PATH $(which go) test -v -run TestPhase1 || echo "Integration tests skipped (namespace support may be limited in CI)"
